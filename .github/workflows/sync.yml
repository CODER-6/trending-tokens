name: Sync Binance Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

concurrency:
  group: binance-snapshot-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect Binance data and push to Cloudflare
        env:
          INGEST_BASE_URL: ${{ secrets.INGEST_BASE_URL }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: node scripts/collect-and-push.mjs
